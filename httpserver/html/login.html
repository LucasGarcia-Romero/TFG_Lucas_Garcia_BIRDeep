<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="common.css">
  <title>Bird Recorder — Login</title>
  <style>
    .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px; }
    .login-card{ width:100%; max-width:420px; }
    .login-brand{ justify-content:center; margin-bottom:22px; text-align:left; }
    .login-card h2{ text-align:center; margin-bottom:8px; }
    .login-card .subtitle{ text-align:center; }
  </style>
</head>
<body>
  <main class="login-wrap">
    <section class="card login-card">
      <div class="brand login-brand">
        <div class="brand-badge"><img src="favicon.ico" alt="logo"></div>
        <div><h1>Bird Recorder</h1><p>Acceso al panel</p></div>
      </div>
      <h2>Iniciar sesión</h2>
      <p class="subtitle">Introduce tus credenciales para entrar en la estación.</p>
      <form id="login-form">
        <div class="field" style="margin-bottom:14px">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div class="field" style="margin-bottom:18px">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-block" id="login-btn" type="submit">Entrar</button>
        <div class="message" id="login-message"></div>
      </form>
    </section>
  </main>
<script>
(function(){
  var hasCookie = document.cookie.split(';').some(function(c){ return c.trim().startsWith('birdsession='); });
  if (hasCookie) window.location.href = '/index.html';
})();
function showLoginMessage(text, ok){
  const el = document.getElementById('login-message');
  el.textContent = text;
  el.className = 'message visible ' + (ok ? 'ok' : 'error');
}
document.getElementById('login-form').addEventListener('submit', function(e){
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  const body = new URLSearchParams(new FormData(e.currentTarget)).toString();
  fetch('/login', { method:'POST', headers:{ 'Content-Type':'application/x-www-form-urlencoded' }, body })
    .then(function(r){ return r.json().catch(function(){ return { ok: r.ok }; }); })
    .then(function(data){
      if (data.ok || data.success) {
        if (!document.cookie.split(';').some(function(c){ return c.trim().startsWith('birdsession='); })) {
          document.cookie = 'birdsession=1; path=/; max-age=86400';
        }
        window.location.href = '/index.html';
      } else {
        showLoginMessage(data.error || 'Usuario o contraseña incorrectos.', false);
        btn.disabled = false;
      }
    })
    .catch(function(){ showLoginMessage('Error de conexión al iniciar sesión.', false); btn.disabled = false; });
});
</script>
</body>
</html>
