<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="common.css">
  <title>Bird Recorder — Sensores</title>
  <style>
    .controls{ display:grid; grid-template-columns:1fr; gap:18px; margin-bottom:24px; }
    .control-card{ background:rgba(0,0,0,0.25); border:1px solid var(--card-border); border-radius:16px; padding:18px; }
    .control-label{ display:block; color:var(--muted); font-size:13px; margin-bottom:10px; }
    .metric-toggle,.quick-actions{ display:flex; flex-wrap:wrap; gap:10px; }
    .metric-btn,.range-btn,.apply-btn{ border:none; border-radius:999px; background:rgba(255,255,255,0.08); color:var(--text); padding:9px 13px; cursor:pointer; }
    .metric-btn.active,.range-btn.active,#btn-realtime.active{ background:var(--accent); color:white; font-weight:bold; }
    .range-grid{ display:grid; grid-template-columns:1fr auto; gap:16px; align-items:end; }
    input[type="range"]{ width:100%; padding:0; }
    .exact-range{ display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:end; margin-top:14px; }
    .date-field{ display:flex; flex-direction:column; gap:6px; }
    .date-field label{ color:var(--muted); font-size:13px; }
    .temp-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:18px; }
    .temp-big{ display:flex; align-items:baseline; gap:8px; }
    .temp-value{ font-size:56px; font-weight:bold; }
    .temp-unit{ color:var(--muted); font-size:22px; }
    .chart-wrap{ position:relative; }
    .chart-container{ height:280px; margin-top:8px; }
    .stats-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:22px; }
    .stat{ padding:16px; border-radius:14px; background:rgba(255,255,255,0.05); text-align:center; }
    .stat .label{ font-size:12px; color:var(--muted); margin-bottom:6px; }
    .stat .value{ font-size:26px; font-weight:bold; }
    .loading-overlay{ display:none; position:absolute; inset:0; background:rgba(0,0,0,0.4); border-radius:16px; align-items:center; justify-content:center; color:var(--muted); }
    .loading-overlay.visible{ display:flex; }
    @media(max-width:700px){ .temp-header{ flex-direction:column; } .range-grid,.exact-range,.stats-grid{ grid-template-columns:1fr; } .temp-value{ font-size:42px; } }
  </style>
</head>
<body>
<div class="wrapper">
  <header class="page-header">
    <a class="page-logo-link" href="/index.html" aria-label="Inicio">
      <div class="brand-badge"><img src="favicon.ico" alt="logo"></div>
    </a>
    <div class="page-title">
      <h1>Sensores</h1>
      <p>Histórico de temperatura interna, DHT22 y humedad</p>
    </div>
    <a class="back-btn" href="/index.html">← Volver</a>
  </header>

  <section class="controls">
    <div class="control-card">
      <span class="control-label">Variable a mostrar</span>
      <div class="metric-toggle">
        <button class="metric-btn active" data-metric="internal_temp" onclick="setMetric('internal_temp')">CPU / interna</button>
        <button class="metric-btn" data-metric="external_temp" onclick="setMetric('external_temp')">DHT22 / externa</button>
        <button class="metric-btn" data-metric="humidity" onclick="setMetric('humidity')">Humedad</button>
      </div>
    </div>
    <div class="control-card">
      <span class="control-label">Rango temporal rápido</span>
      <div class="range-grid">
        <div><input id="hours-slider" type="range" min="1" max="168" value="1" oninput="previewSliderRange()"><div class="small" id="slider-label">Últimas 1 h</div></div>
        <div class="quick-actions">
          <button class="range-btn active" id="btn-realtime" onclick="setRealtimeMode()">Tiempo real</button>
          <button class="range-btn" data-hours="1" onclick="setQuickRange(1)">1 h</button>
          <button class="range-btn" data-hours="6" onclick="setQuickRange(6)">6 h</button>
          <button class="range-btn" data-hours="24" onclick="setQuickRange(24)">24 h</button>
          <button class="range-btn" data-hours="72" onclick="setQuickRange(72)">3 días</button>
          <button class="range-btn" data-hours="168" onclick="setQuickRange(168)">7 días</button>
        </div>
      </div>
      <div class="exact-range">
        <div class="date-field"><label>Inicio exacto</label><input type="datetime-local" id="date-from"></div>
        <div class="date-field"><label>Fin exacto <span style="opacity:0.5">(vacío = ahora)</span></label><input type="datetime-local" id="date-to"></div>
        <button class="apply-btn" onclick="loadHistoryFromInputs()">Aplicar rango exacto</button>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="temp-header">
      <div><h2 id="sensor-title">Temperatura interna</h2><p class="subtitle" id="sensor-status">Cargando histórico…</p></div>
      <div><div class="temp-big"><span class="temp-value" id="sensor-value">--</span><span class="temp-unit" id="sensor-unit">°C</span></div><div class="small" id="last-update">actualizando…</div></div>
    </div>
    <div class="chart-wrap"><div class="chart-container"><canvas id="sensorChart"></canvas></div><div class="loading-overlay" id="loading">Cargando datos…</div></div>
    <div class="stats-grid"><div class="stat"><div class="label">Mínima</div><div class="value" id="stat-min">--</div></div><div class="stat"><div class="label">Máxima</div><div class="value" id="stat-max">--</div></div><div class="stat"><div class="label">Media</div><div class="value" id="stat-avg">--</div></div></div>
  </section>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){ var hasCookie = document.cookie.split(';').some(function(c){ return c.trim().startsWith('birdsession='); }); if (!hasCookie) window.location.href = '/login.html'; })();
const METRICS = { internal_temp:{label:'Temperatura interna', unit:'°C'}, external_temp:{label:'Temperatura externa', unit:'°C'}, humidity:{label:'Humedad', unit:'%'} };
let currentMetric = 'internal_temp', currentMode = 'realtime', realtimeEntries = [], lastRealtimeTimestamp = null;
const MAX_REALTIME_POINTS = 40;
const labels = [], values = [];
const ctx = document.getElementById('sensorChart').getContext('2d');
const chart = new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:METRICS[currentMetric].label, data:values, borderWidth:2, pointRadius:2, pointHoverRadius:5, tension:0.3, fill:false }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#e8f5e9' } } }, scales:{ x:{ ticks:{ color:'#b7d6b8' }, grid:{ color:'rgba(255,255,255,0.08)' } }, y:{ ticks:{ color:'#b7d6b8', callback:v => v + METRICS[currentMetric].unit }, grid:{ color:'rgba(255,255,255,0.08)' } } } } });
function setLoading(v){ document.getElementById('loading').classList.toggle('visible', !!v); }
function toDatetimeLocal(d){ const pad=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes()); }
function formatLocalDateTime(d){ const pad=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function formatLabel(ts){ const d = new Date(ts); return isNaN(d) ? ts : d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function setDateInputs(fromDate, toDate){ document.getElementById('date-from').value = toDatetimeLocal(fromDate); document.getElementById('date-to').value = toDate ? toDatetimeLocal(toDate) : ''; }
function resetStats(){ ['stat-min','stat-max','stat-avg'].forEach(id => document.getElementById(id).textContent='--'); }
function updateHeader(value, timestamp){ const cfg = METRICS[currentMetric]; document.getElementById('sensor-title').textContent = cfg.label; document.getElementById('sensor-unit').textContent = cfg.unit; document.getElementById('sensor-value').textContent = value === null || value === undefined || Number.isNaN(Number(value)) ? '--' : Number(value).toFixed(1); document.getElementById('last-update').textContent = timestamp ? new Date(timestamp).toLocaleString('es-ES') : 'sin datos'; }
function updateStats(vals){ if(!vals.length){ resetStats(); return; } const min=Math.min(...vals), max=Math.max(...vals), avg=vals.reduce((a,b)=>a+b,0)/vals.length, u=METRICS[currentMetric].unit; document.getElementById('stat-min').textContent=min.toFixed(1)+u; document.getElementById('stat-max').textContent=max.toFixed(1)+u; document.getElementById('stat-avg').textContent=avg.toFixed(1)+u; chart.options.scales.y.ticks.callback = v => v + u; }
function clearChart(){ labels.length = 0; values.length = 0; }
function renderEntries(entries){ clearChart(); const valid=[]; entries.forEach(e => { const v = e[currentMetric]; if(v === null || v === undefined || Number.isNaN(Number(v))) return; labels.push(formatLabel(e.timestamp)); values.push(Number(v)); valid.push({ timestamp:e.timestamp, value:Number(v) }); }); if(!valid.length){ chart.update(); updateHeader(null,null); resetStats(); document.getElementById('sensor-status').textContent = currentMode === 'realtime' ? 'Sin datos en tiempo real' : 'Sin datos en ese rango'; return; } const last=valid[valid.length-1]; updateHeader(last.value,last.timestamp); updateStats(values); chart.data.datasets[0].label = METRICS[currentMetric].label; chart.update(); document.getElementById('sensor-status').textContent = `${valid.length} lecturas · ${currentMode === 'realtime' ? 'tiempo real' : METRICS[currentMetric].label}`; }
function loadHistory(fromDate,toDate,silent=false){ currentMode='quick'; const from=encodeURIComponent(formatLocalDateTime(fromDate)); const to=encodeURIComponent(formatLocalDateTime(toDate || new Date())); if(!silent){ setLoading(true); document.getElementById('sensor-status').textContent='Cargando histórico…'; } fetch(`/sensors/history?from=${from}&to=${to}`).then(r=>r.json()).then(data=>{ setLoading(false); if(data.error){ document.getElementById('sensor-status').textContent=data.error; return; } renderEntries(data.entries || []); }).catch(()=>{ setLoading(false); document.getElementById('sensor-status').textContent='Error al cargar histórico'; }); }
function fetchRealtime(silent=false){ currentMode='realtime'; if(!silent){ setLoading(true); document.getElementById('sensor-status').textContent='Leyendo tiempo real…'; } fetch('/sensors/latest').then(r=>r.json()).then(data=>{ setLoading(false); if(data.error){ document.getElementById('sensor-status').textContent=data.error; return; } if(data.timestamp && data.timestamp !== lastRealtimeTimestamp){ realtimeEntries.push(data); lastRealtimeTimestamp = data.timestamp; if(realtimeEntries.length > MAX_REALTIME_POINTS) realtimeEntries.shift(); } setDateInputs(new Date(), null); renderEntries(realtimeEntries); }).catch(()=>{ setLoading(false); document.getElementById('sensor-status').textContent='Error al leer sensores'; }); }
function updateSliderLabel(){ const hours=Number(document.getElementById('hours-slider').value); document.getElementById('slider-label').textContent = hours < 24 ? `Últimas ${hours} h` : `Últimos ${Math.round(hours/24)} días`; }
function getRangeFromSlider(){ const hours=Number(document.getElementById('hours-slider').value); const to=new Date(); const from=new Date(to.getTime()-hours*60*60*1000); return {from,to,hours}; }
function previewSliderRange(){ updateSliderLabel(); const r=getRangeFromSlider(); setDateInputs(r.from,null); }
function setActiveRangeButton(hours){ document.getElementById('btn-realtime').classList.remove('active'); document.querySelectorAll('.range-btn[data-hours]').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.hours) === hours)); }
function applySliderRange(){ const r=getRangeFromSlider(); setActiveRangeButton(r.hours); setDateInputs(r.from,null); loadHistory(r.from,r.to); }
function setQuickRange(hours){ document.getElementById('hours-slider').value=hours; updateSliderLabel(); applySliderRange(); }
function setRealtimeMode(){ currentMode='realtime'; document.getElementById('btn-realtime').classList.add('active'); document.querySelectorAll('.range-btn[data-hours]').forEach(btn => btn.classList.remove('active')); realtimeEntries=[]; lastRealtimeTimestamp=null; clearChart(); chart.update(); resetStats(); fetchRealtime(); }
function loadHistoryFromInputs(){ const fromVal=document.getElementById('date-from').value; const toVal=document.getElementById('date-to').value; if(!fromVal){ document.getElementById('sensor-status').textContent='Indica una fecha de inicio'; return; } document.getElementById('btn-realtime').classList.remove('active'); document.querySelectorAll('.range-btn[data-hours]').forEach(btn => btn.classList.remove('active')); loadHistory(new Date(fromVal), toVal ? new Date(toVal) : new Date()); }
function setMetric(metric){ currentMetric=metric; document.querySelectorAll('.metric-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.metric === metric)); updateHeader(values.length ? values[values.length-1] : null, null); if(currentMode === 'realtime') renderEntries(realtimeEntries); else loadHistoryFromInputs(); }
previewSliderRange();
setRealtimeMode();
setInterval(function(){ if(currentMode === 'realtime') fetchRealtime(true); }, 5000);
</script>
</body>
</html>
