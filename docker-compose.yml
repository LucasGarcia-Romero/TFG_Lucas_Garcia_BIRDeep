services:
  recorder:
    build:
      context: .
      dockerfile: recorder/Dockerfile
    container_name: bird-recorder
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - /data:/data
    environment:
      - DATA_DIR=/data
      - STATION=TECHOUTAD_
      - BITRATE=16
      - SAMPLE_RATE=32000
      - GAIN=5.0
      - DURATION=60
      - IDRECORDER=1
      - SLEEPDURATION=10
      - GPIO_PIN=117
      - AUDIO_DEVICE=hw:2,0
      - WATCHDOG_MARGIN_SECONDS=600
      - WATCHDOG_MIN_VALID_WAV_RATIO_PERCENT=5
      - WATCHDOG_DISK_MAX_USED_PERCENT=95
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 20s
      retries: 2
      start_period: 3m

  stats:
    build:
      context: .
      dockerfile: stats/Dockerfile
    container_name: bird-stats
    restart: unless-stopped
    privileged: true
    volumes:
      - /data:/data
      - /etc/orangepi-release:/etc/orangepi-release:ro
    environment:
      - DATA_DIR=/data
      - SLEEP_INTERVAL=60
      - MAX_LINES=130000
      - LD_LIBRARY_PATH=/usr/local/lib:/usr/lib

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: bird-http-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  recorder-watchdog:
    build:
      context: .
      dockerfile: watchdog/Dockerfile
    container_name: bird-recorder-watchdog
    restart: unless-stopped
    depends_on:
      - recorder
    volumes:
      - /data:/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RECORDER_CONTAINER=bird-recorder
      - DATA_DIR=/data
      - CHECK_INTERVAL=60
      - DURATION=60
      - SLEEPDURATION=10
      - WATCHDOG_MARGIN_SECONDS=600
      - WATCHDOG_MIN_VALID_WAV_RATIO_PERCENT=5
      - WATCHDOG_EMPTY_WAV_CONSECUTIVE_LIMIT=5
      - WATCHDOG_DISK_MAX_USED_PERCENT=95
      - WATCHDOG_RESTART_COOLDOWN_SECONDS=300
      - SAMPLE_RATE=32000
      - BITRATE=16
      - CHANNELS=1

volumes:
  bird_data:
