services:
  recorder:
    build:
      context: .
      dockerfile: recorder/Dockerfile
    container_name: bird-recorder
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - /data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - DATA_DIR=/data
      - STATION=TECHOUTAD_
      - BITRATE=16
      - SAMPLE_RATE=32000
      - GAIN=5.0
      - DURATION=60
      - IDRECORDER=1
      - SLEEPDURATION=10
      - GPIO_PIN=117
      - AUDIO_DEVICE=plughw:CARD=Microphone,DEV=0
      - WATCHDOG_MARGIN_SECONDS=600
      - WATCHDOG_MIN_VALID_WAV_RATIO_PERCENT=5
      - WATCHDOG_DISK_MAX_USED_PERCENT=95
      - WATCHDOG_EMPTY_WAV_CONSECUTIVE_LIMIT=5
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 20s
      retries: 2
      start_period: 3m

  stats:
    build:
      context: .
      dockerfile: stats/Dockerfile
    container_name: bird-stats
    restart: unless-stopped
    privileged: true
    volumes:
      - /data:/data
      - /etc/orangepi-release:/etc/orangepi-release:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - DATA_DIR=/data
      - SLEEP_INTERVAL=60
      - MAX_LINES=130000
      - LD_LIBRARY_PATH=/usr/local/lib:/usr/lib
      - STATS_MAX_AGE_SECONDS=300
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 2m

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: bird-http-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - SERVER_HEALTH_URL=http://127.0.0.1:8000/
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  recorder-watchdog:
    build:
      context: .
      dockerfile: watchdog/Dockerfile
    container_name: bird-recorder-watchdog
    restart: unless-stopped
    depends_on:
      - recorder
      - stats
      - server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - WATCHDOG_CONTAINERS=bird-recorder,bird-stats,bird-http-server
      - CHECK_INTERVAL=60
      - WATCHDOG_RESTART_COOLDOWN_SECONDS=300
      - WATCHDOG_FAILURE_WINDOW_SECONDS=1800
      - WATCHDOG_MAX_RESTARTS_IN_WINDOW=3
      - WATCHDOG_LONG_COOLDOWN_SECONDS=1800
      - WATCHDOG_STATUS_FILE=/data/watchdog_status.json

volumes:
  bird_data: